name = "mongreldb"
version = "0.52.3"
description = "Pure-Gleam HTTP client for MongrelDB."
licences = ["MIT", "Apache-2.0"]
repository = { type = "github", user = "visorcraft", repo = "MongrelDB-Gleam" }
links = [
  { title = "MongrelDB", href = "https://www.MongrelDB.com" },
]
gleam = ">= 1.4.0"

[dependencies]
# This client, gleam_http 3.6.x/3.7.x and gleam_json 1.x all rely on the
# classic gleam_stdlib API surface that overlaps in a narrow window:
#   * gleam/regex (imported by gleam/http/cookie.gleam) is present through 0.48.0
#   * gleam/string_builder (used by gleam_json 1.x) was removed in 0.48.0
#     (renamed to gleam/string_tree), so gleam_json 1.0.1 needs < 0.48.0
#   * the classic gleam/dynamic decoding API (dynamic.field, DecodeError) is
#     present through 0.59.0
# The only stdlib that satisfies regex + string_builder at once is 0.44-0.47,
# so pin strictly below 0.48.0. Keep gleam_http below 3.7.2 (which would
# otherwise drag in a newer stdlib with the new dynamic API).
gleam_stdlib = ">= 0.44.0 and < 0.48.0"
gleam_http = ">= 3.6.0 and < 3.7.2"
gleam_json = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
